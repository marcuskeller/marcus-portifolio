<section id="contato" class="section-seam py-24 px-6 bg-white dark:bg-[#0f172a]">
  <div appScrollReveal class="max-w-3xl mx-auto text-center">
    <h2
      appTitleReveal
      class="section-title w-fit mx-auto mb-4 text-3xl md:text-4xl font-extrabold tracking-tight bg-gradient-to-r from-indigo-500 to-purple-500 bg-clip-text text-transparent"
    >
      {{ text().title }}
    </h2>
    <p class="text-base text-slate-600 dark:text-slate-300 mb-8">
      {{ text().subtitle }}
    </p>

    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mt-10">
      @for (social of socialLinks(); track social.platform) {
        <a
          [href]="social.url"
          target="_blank"
          rel="noopener"
          class="flex flex-col items-center gap-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-white/5 p-6 shadow-sm hover:shadow-[0_0_35px_rgba(99,102,241,0.4)] hover:border-indigo-400 dark:hover:border-indigo-500 hover:-translate-y-1 transition-all"
        >
          <span
            class="grid place-items-center size-12 rounded-full text-white bg-gradient-to-br from-indigo-500 to-purple-500"
          >
            @if (social.platform === 'github' || social.platform === 'whatsapp') {
              <app-brand-icon [name]="social.platform" [size]="20" />
            } @else {
              <lucide-angular [img]="iconFor(social.platform)" [size]="20" />
            }
          </span>
          <span class="font-medium text-slate-900 dark:text-white">{{ social.label }}</span>
        </a>
      }
    </div>
  </div>
</section>
