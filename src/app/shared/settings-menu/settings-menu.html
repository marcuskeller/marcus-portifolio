<div class="relative">
  <button
    type="button"
    (click)="toggle()"
    i18n-aria-label="@@settingsMenu.ariaLabel"
    aria-label="Configurações"
    [attr.aria-expanded]="isOpen()"
    class="grid place-items-center size-9 rounded-full border border-slate-300 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:border-indigo-400 dark:hover:border-indigo-500 hover:bg-slate-900/5 dark:hover:bg-white/10 transition-colors"
  >
    <lucide-angular [img]="SettingsIcon" [size]="18" />
  </button>

  @if (isOpen()) {
    <div
      class="absolute right-0 top-full mt-2 z-50 w-48 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 shadow-xl p-4 flex flex-col gap-4"
    >
      <div class="flex items-center justify-between gap-3">
        <span class="text-sm text-slate-600 dark:text-slate-300" i18n="@@settingsMenu.themeLabel">
          Tema
        </span>
        <app-theme-toggle />
      </div>
      <div class="flex items-center justify-between gap-3">
        <span
          class="text-sm text-slate-600 dark:text-slate-300"
          i18n="@@settingsMenu.languageLabel"
        >
          Idioma
        </span>
        <div
          class="inline-flex h-7 items-center rounded-full border border-slate-300 dark:border-slate-700 bg-slate-200 dark:bg-slate-800 p-0.5 text-[11px] font-bold tracking-wide"
        >
          @if (isPt) {
            <span
              class="flex h-6 items-center justify-center rounded-full px-2.5 bg-indigo-500 text-white"
            >
              PT
            </span>
            <a
              [href]="switchUrl"
              i18n-aria-label="@@settingsMenu.switchToEn"
              aria-label="Mudar para inglês"
              class="flex h-6 items-center justify-center rounded-full px-2.5 text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition-colors"
            >
              EN
            </a>
          } @else {
            <a
              [href]="switchUrl"
              i18n-aria-label="@@settingsMenu.switchToPt"
              aria-label="Mudar para português"
              class="flex h-6 items-center justify-center rounded-full px-2.5 text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition-colors"
            >
              PT
            </a>
            <span
              class="flex h-6 items-center justify-center rounded-full px-2.5 bg-indigo-500 text-white"
            >
              EN
            </span>
          }
        </div>
      </div>
    </div>
  }
</div>
